name: event_manager
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  flutter_native_splash: ^2.4.7
  auto_route: ^11.1.0
  flutter_bloc: ^8.1.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  pull_to_refresh: ^2.0.0
  get_it: ^9.2.1
  provider: ^6.1.2

dev_dependencies:
  auto_route_generator: ^10.5.0
  build_runner: ^2.13.1

  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter_gen:
  output: lib/l10n/

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/

flutter_native_splash:
  image: assets/sdu_logo.png
